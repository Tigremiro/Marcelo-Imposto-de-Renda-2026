<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARCELO IMPOSTO DE RENDA 2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; text-align: center; margin: 0; padding: 0; background-color: #f4f7f6; }
        header { background-color: #004a99; color: white; padding: 20px; }
        
        /* Selo Holográfico Superior */
        .selo-holografico {
            background: linear-gradient(90deg, #ff00ff, #00ffff, #ffff00, #ff00ff);
            background-size: 300% 100%;
            animation: brilho 60s linear infinite; 
            color: #000; font-weight: 900; font-size: 14px; padding: 8px 0; width: 100%; overflow: hidden; white-space: nowrap; text-transform: uppercase; border-bottom: 2px solid #fff;
        }
        @keyframes brilho { 0% { background-position: 0% 50%; } 100% { background-position: 300% 50%; } }

        .card { background: white; padding: 30px; margin: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        
        /* Botão Consultar */
        button#btn-abrir { background-color: #28a745; color: white; border: none; padding: 15px 25px; border-radius: 5px; cursor: pointer; font-size: 16px; width: 100%; margin-bottom: 20px; }
        
        /* Botão WhatsApp com Efeito Radar Sutil */
        .radar-whatsapp { position: relative; display: inline-block; width: 80%; }
        .radar-whatsapp::before {
            content: ''; position: absolute; top: 50%; left: 50%; width: 100%; height: 100%;
            border: 2px solid rgba(37, 211, 102, 0.4); border-radius: 5px;
            transform: translate(-50%, -50%); animation: sonar-sutil 3s infinite; z-index: 0;
        }
        @keyframes sonar-sutil {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
            100% { transform: translate(-50%, -50%) scale(1.15); opacity: 0; }
        }
        .btn-whatsapp { background-color: #25d366; color: white; padding: 15px 25px; border-radius: 5px; text-decoration: none; display: block; font-weight: bold; font-size: 16px; position: relative; z-index: 1; }
        
        #modal-consulta { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; }
        .barra-fechar { padding: 15px; background: #333; text-align: right; }
        button#btn-fechar { background: #dc3545; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        iframe { width: 100%; height: 90vh; border: none; }
    </style>
</head>
<body>

    <div class="selo-holografico">MARCELO IMPOSTO DE RENDA 2026 - MARCELO IMPOSTO DE RENDA 2026 - MARCELO IMPOSTO DE RENDA 2026</div>

    <header>
        <h1>MARCELO IMPOSTO DE RENDA 2026</h1>
        <p>Portal de Orientação para Consulta de Restituição</p>
    </header>

    <main>
        <section class="card">
            <h2>Verificar Lote de Restituição</h2>
            <button id="btn-abrir">Consultar no Portal Oficial</button>
            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
            <p>Dúvidas? Fale comigo:</p>
            
            <div class="radar-whatsapp">
                <a href="https://wa.me/5519981452033" class="btn-whatsapp" target="_blank">
                    <i class="fab fa-whatsapp"></i> Chamar no WhatsApp
                </a>
            </div>
        </section>
    </main>

    <div id="modal-consulta">
        <div class="barra-fechar"><button id="btn-fechar">Fechar e Voltar</button></div>
        <iframe src="https://www.restituicao.receita.fazenda.gov.br/" title="Consulta"></iframe>
    </div>

    <script>
        const btnAbrir = document.getElementById('btn-abrir');
        const btnFechar = document.getElementById('btn-fechar');
        const modal = document.getElementById('modal-consulta');
        btnAbrir.addEventListener('click', () => { modal.style.display = 'block'; });
        btnFechar.addEventListener('click', () => { modal.style.display = 'none'; });
    </script>
</body>
</html>
